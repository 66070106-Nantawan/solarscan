version: "3.8"

services:

  # FastAPI Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: solarscan_api
    ports:
      - "8000:8000"
    volumes:
      - ./model:/app/model
    environment:
      - MODEL_PATH=model/weights/best.pt
    restart: unless-stopped

  # Gradio Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.gradio
    container_name: solarscan_frontend
    ports:
      - "8080:8080"
    environment:
      - API_URL=http://api:8000/predict
    depends_on:
      - api
    restart: unless-stopped

  # MLflow Tracking
  mlflow:
    image: ghcr.io/mlflow/mlflow:latest
    container_name: solarscan_mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow_tracking:/mlflow
    command: mlflow server --host 0.0.0.0 --port 5000 --backend-store-uri /mlflow
    restart: unless-stopped
